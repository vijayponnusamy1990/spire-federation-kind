server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    trust_domain = "hub.com"
    data_dir = "/run/spire/data"
    log_level = "DEBUG"

    ca_subject = {
        country = ["US"],
        organization = ["SPIFFE"],
        common_name = "hub.com",
    }

    federation {
        bundle_endpoint {
            address = "0.0.0.0"
            port = 8443
            profile "https_spiffe" {}
        }

        federates_with "cluster1.com" {
            bundle_endpoint_url = "https://172.18.254.1:8443"
            bundle_endpoint_profile "https_spiffe" {
                endpoint_spiffe_id = "spiffe://cluster1.com/spire/server"
            }
        }

        federates_with "cluster2.com" {
            bundle_endpoint_url = "https://172.18.255.1:8443"
            bundle_endpoint_profile "https_spiffe" {
                endpoint_spiffe_id = "spiffe://cluster2.com/spire/server"
            }
        }
    }
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/run/spire/data/datastore.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            keys_path = "/run/spire/data/keys.json"
        }
    }
}
